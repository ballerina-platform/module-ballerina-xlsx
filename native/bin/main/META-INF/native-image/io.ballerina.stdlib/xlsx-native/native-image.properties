# Apache POI requires Windows-1252 (CP1252) for OOXML file headers and other
# legacy encodings depending on the source workbook. GraalVM native-image
# bundles only a minimal charset set by default (UTF-8, ISO-8859-1, US-ASCII);
# this flag includes all standard JDK charsets in the native binary.
Args = -H:+AddAllCharsets
